version: '3.8'

services:
  producer:
    image: python:3.9-slim
    container_name: log-producer
    volumes:
      - .:/app
    working_dir: /app
    command: python src/producer.py

  processor:
    image: python:3.9-slim
    container_name: log-processor
    volumes:
      - .:/app
    working_dir: /app
    command: python src/processor.py
    depends_on:
      - producer